<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Buscar Árbitros</title>
    <link rel="stylesheet" href="/styleWeb.css"/>
</head>
<body>
    <a th:href="@{/web/menu}">
        <button type="button">Voltar ao Menu</button>
    </a>
    <h1>Buscar Árbitros</h1>
    <form method="get" th:action="@{/web/arbitros}">
        <input type="text" name="nome" placeholder="Nome do árbitro"/>
        <input type="number" name="jogosOficiados" placeholder="Nº jogos oficiados"/>
        <input type="number" name="cartoesMostrados" placeholder="Nº cartões mostrados"/>
        <button type="submit">Filtrar</button>
    </form>
    <table>
        <tr>
            <th>Nome</th>
            <th>Username</th>
            <th>Certificado</th>
            <th>Nº Jogos Oficiados</th>
            <th>Nº Cartões Mostrados</th>
        </tr>
        <tr th:each="a : ${arbitros}">
            <td th:text="${a.nome}"></td>
            <td th:text="${a.username}"></td>
            <td th:text="${a.isCertificated}"></td>
            <td th:text="${a.jogosOficiados != null ? a.jogosOficiados.size() : 0}"></td>
            <td th:text="${a.cartoesMostrados != null ? a.cartoesMostrados.size() : 0}"></td>
        </tr>
    </table>
</body>
</html>
